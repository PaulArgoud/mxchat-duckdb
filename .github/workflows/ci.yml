name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: php -l (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.0', '8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none
      - name: Lint PHP files
        run: |
          status=0
          for f in $(find . -name '*.php' -not -path './vendor/*' -not -path './tests/_output/*'); do
            php -l "$f" || status=1
          done
          exit $status

  i18n:
    name: i18n catalog check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install gettext
        run: sudo apt-get update && sudo apt-get install -y gettext
      - name: Validate fr_FR.po
        run: msgfmt --check languages/mxchat-duckdb-fr_FR.po -o /tmp/check.mo

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    continue-on-error: true # baseline-driven; we publish results but don't fail PRs yet
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2, phpstan
          coverage: none
      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --no-interaction || true
      - name: Run PHPStan
        run: phpstan analyse --memory-limit=512M --no-progress

  phpunit:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none
      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --no-interaction
      - name: Run tests
        run: vendor/bin/phpunit --testdox
