name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: php -l (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.0', '8.1', '8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none
      - name: Lint PHP files
        run: |
          status=0
          for f in $(find . -name '*.php' -not -path './vendor/*' -not -path './tests/_output/*'); do
            php -l "$f" || status=1
          done
          exit $status

  i18n:
    name: i18n catalog check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install gettext
        run: sudo apt-get update && sudo apt-get install -y gettext
      - name: Validate fr_FR.po
        run: msgfmt --check languages/mxchat-duckdb-fr_FR.po -o /tmp/check.mo

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    # Was continue-on-error while we onboarded szepeviktor/phpstan-wordpress;
    # the first run after the bump (25995890134) was silent at level 6, so the
    # flag is dropped — PHPStan now blocks the build like the other jobs. The
    # path to level 7/8 is still tracked in phpstan.neon.dist.
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
          coverage: none
      - name: Install dependencies (with dev — needed for phpstan-wordpress stubs)
        run: composer install --no-progress --prefer-dist --no-interaction
      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=512M --no-progress

  phpunit:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none
      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --no-interaction
      - name: Run tests
        run: vendor/bin/phpunit --testdox

  audit:
    name: composer audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none
      - name: Install dependencies (production only)
        # The release zip ships only production deps; dev advisories (phpunit /
        # phpstan) don't reach end users. Audit accordingly.
        run: composer install --no-dev --no-progress --prefer-dist --no-interaction
      - name: Audit production dependencies
        run: composer audit --abandoned=report
